services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobassistant
      POSTGRES_PASSWORD: jobassistant
      POSTGRES_DB: jobassistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobassistant -d jobassistant"]
      interval: 5s
      timeout: 5s
      retries: 5

  rag-api:
    build:
      context: ./services/rag-api
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - faiss_data:/data/faiss
    environment:
      FAISS_INDEX_PATH: /data/faiss/jobs.index

volumes:
  pgdata:
  faiss_data:
