services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobassistant
      POSTGRES_PASSWORD: jobassistant
      POSTGRES_DB: jobassistant
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobassistant -d jobassistant"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  rag-api:
    build:
      context: ./services/rag-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${RAG_PORT:-8001}:8001"
    volumes:
      - faiss_data:/data/faiss
    environment:
      FAISS_INDEX_PATH: /data/faiss/jobs.index

volumes:
  pgdata:
  faiss_data:
